<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Agency // Secure Terminal Node</title>
    <style>
        :root {
            --dark: #0a0a12;
            --cyan: #00f2fe;
            --blue-accent: #4facfe;
            --pink: #ff007f;
            --text-gray: #a2a2ba;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body, html {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background-color: var(--dark);
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            position: relative;
            overscroll-behavior: none;
        }

        /* Scan Line Overlay Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
        }

        .hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }

        /* --- SCREEN 1: THE SCANNER --- */
        .terminal-header {
            color: var(--cyan);
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-align: center;
        }

        .alert-banner {
            color: var(--pink);
            font-size: 0.9rem;
            margin-bottom: 40px;
            animation: flashText 1.5s infinite;
        }

        .scanner-container {
            position: relative;
            width: 180px;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .scanner-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px dashed var(--cyan);
            border-radius: 50%;
            animation: spinRing 20s linear infinite;
        }

        .thumbprint-pad {
            width: 120px;
            height: 120px;
            background: rgba(0, 242, 254, 0.05);
            border: 2px solid var(--cyan);
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(0, 242, 254, 0.2);
            position: relative;
            overflow: hidden;
            transition: background 0.3s, transform 0.1s;
        }

        .thumbprint-pad:active {
            transform: scale(0.96);
            background: rgba(255, 0, 127, 0.15);
            border-color: var(--pink);
            box-shadow: inset 0 0 20px rgba(255, 0, 127, 0.4);
        }

        .thumbprint-icon {
            width: 64px;
            height: 64px;
            fill: var(--cyan);
            transition: fill 0.3s;
        }

        .thumbprint-pad:active .thumbprint-icon {
            fill: var(--pink);
        }

        .laser-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(180deg, transparent, var(--cyan));
            box-shadow: 0 0 12px var(--cyan);
            top: 0;
            left: 0;
            opacity: 0;
            pointer-events: none;
        }

        .scanning .laser-line {
            opacity: 1;
            animation: laserScan 2s ease-in-out infinite;
        }

        .status-log {
            margin-top: 40px;
            font-size: 0.85rem;
            color: var(--text-gray);
            height: 20px;
            text-align: center;
            max-width: 300px;
        }

        /* --- SCREEN 2: THE PREVIOUS ID BADGE --- */
        .badge-frame {
            width: 100%;
            max-width: 340px;
            background: rgba(10, 10, 18, 0.85);
            border: 2px solid var(--cyan);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.15);
            position: relative;
        }

        .badge-tag {
            position: absolute;
            top: -12px;
            right: 20px;
            background: var(--pink);
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 4px;
            letter-spacing: 1px;
        }

        .badge-profile-row {
            display: flex;
            gap: 16px;
            margin-top: 15px;
            align-items: center;
        }

        .badge-photo-box {
            width: 90px;
            height: 110px;
            border: 1px solid var(--text-gray);
            background: #141424;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .badge-photo-box::before {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border-top: 2px solid var(--cyan);
            border-left: 2px solid var(--cyan);
            top: 4px; left: 4px;
        }

        .photo-silhouette {
            width: 50px;
            height: 50px;
            fill: var(--text-gray);
            opacity: 0.4;
        }

        .photo-caption {
            font-size: 0.55rem;
            color: var(--cyan);
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .badge-details {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .detail-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }
