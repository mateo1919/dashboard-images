<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McCropolis Labs // Agent C-08</title>
    <style>
        :root {
            --pink: #ff007f;
            --cyan: #00ffff;
            --dark: #0a0a0a;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none; /* Obliterates Safari's magnifying lens text popup */
        }
        body, html {
            width: 100%;
            height: 100vh;
            height: 100dvh; /* Force modern Safari to track exact viewport dimensions */
            background-color: var(--dark);
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            position: relative;
            overscroll-behavior: none; /* Disables Safari elastic rubber-banding drag */
        }
        /* Screen States */
        .screen {
            display: none;
            width: 100%;
            height: 100dvh;
            position: absolute;
            top: 0;
            left: 0;
        }
        .active {
            display: flex;
            flex-direction: column;
        }
        /* Screen 0: Initializer Gate */
        #screen-gate {
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #111 0%, #000 100%);
        }
        .gate-btn {
            background: transparent;
            border: 2px solid var(--pink);
            color: var(--pink);
            padding: 20px 40px;
            font-size: 1.5rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px var(--pink);
            text-shadow: 0 0 5px var(--pink);
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        /* Screen 1: Terminal & Biometric */
        #screen-one {
            padding: 20px;
            position: relative;
            height: 100dvh;
        }
        #terminal-log {
            width: 100%;
            height: 45%;
            overflow: hidden;
            color: var(--pink);
            font-size: 14px;
            line-height: 1.4;
            text-shadow: 0 0 2px var(--pink);
            white-space: pre-wrap;
        }
        .scanner-graphic {
            width: 100%;
            height: 100%;
            object-fit: contain;  /* Keeps the image aspect ratio perfect without warping */
            pointer-events: none; /* Prevents the image itself from blocking touch/hold inputs on the button */
        }
        .scanning-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            color: var(--pink);
            font-weight: bold;
            font-size: 1.2rem;
            animation: blink 0.8s infinite alternate;
            text-shadow: 0 0 8px var(--pink);
        }
        .biometric-container {
            height: 55%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
